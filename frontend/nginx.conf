server {
    listen 80;
    server_name micro-gaurav-lamichhane.com.np;

    root /usr/share/nginx/html;
    index index.html;

    # Django API
    location /api/admin/ {
        proxy_pass http://admin-backend-1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django's built-in admin panel
    location /django-admin/ {
        proxy_pass http://admin-backend-1:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Flask API
    location /api/main/ {
        proxy_pass http://main-backend-1:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React app (must come after the API blocks)
    location / {
        try_files $uri $uri/ /index.html;
    }
}