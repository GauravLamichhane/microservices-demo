server {
    listen 80;
    server_name micro.gaurav-lamichhane.com.np;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name micro.gaurav-lamichhane.com.np;

    ssl_certificate /etc/letsencrypt/live/micro.gaurav-lamichhane.com.np/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/micro.gaurav-lamichhane.com.np/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location /admin/ {
        proxy_pass http://admin-backend-1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # location /django-admin/ {
    #     proxy_pass http://admin-backend-1:8000/admin/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    location /api/ {
        proxy_pass http://main-backend-1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /minio/ {
    proxy_pass http://minio:9000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
    proxy_pass http://admin-backend-1:8000;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl;
    server_name minio.gaurav-lamichhane.com.np;

    ssl_certificate /etc/letsencrypt/live/minio.gaurav-lamichhane.com.np/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/minio.gaurav-lamichhane.com.np/privkey.pem;

    location / {
        proxy_pass http://minio:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }
}

server {
    listen 443 ssl;
    server_name console.gaurav-lamichhane.com.np;

    ssl_certificate /etc/letsencrypt/live/console.gaurav-lamichhane.com.np/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/console.gaurav-lamichhane.com.np/privkey.pem;

    location / {
    proxy_pass http://minio:9001;

    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
    }
}

