server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/admin/ {
        proxy_pass http://admin-backend-1:8000/api/;
    }

    location /api/main/ {
        proxy_pass http://main-backend-1:5000/api/;
    }

    location /ws/ {
        proxy_pass http://admin-backend-1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }
}