services:
  backend:
    build: .
    command: python main.py
    env_file:
      - .env
    environment:
      - FLASK_APP=main.py
    depends_on:
      - db
      - redis
    ports:
      - "8001:5000"
    volumes:
      - .:/app
    networks:
      - microservices-net
      - default

  queue:
    build: .
    command: "python consumer.py"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - microservices-net
      - default

  db:
    image: postgres:17
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - flask_postgres_data:/var/lib/postgresql/data/

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - default

volumes:
  flask_postgres_data:

networks:
  microservices-net:
    external: true
